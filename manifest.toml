#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "calagopus"
name = "Calagopus"
description.en = "Modern open-source game server management panel built with Rust and React"
description.fr = "Panneau de gestion de serveurs de jeux open-source moderne construit avec Rust et React"

version = "1.0~ynh1"

maintainers = []

[upstream]
license = "MIT"
website = "https://calagopus.com"
admindoc = "https://calagopus.com/docs"
userdoc = "https://calagopus.com/docs"
code = "https://github.com/calagopus/panel"

[integration]
yunohost = ">= 12.1.17"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = false

ldap = false
sso = false

disk = "1G"
ram.build = "256M"
ram.runtime = "512M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

[resources]

    [resources.system_user]

    [resources.install_dir]
    dir = "/opt/calagopus"

    [resources.permissions]
    main.url = "/"
    main.show_tile = true
    main.protected = false

    [resources.ports]
    main.default = 8000
    main.exposed = "TCP"
    main.fixed = true

    [resources.apt]
    packages = [
        "curl",
        "apt-transport-https",
        "gnupg",
        "postgresql",
        "postgresql-contrib",
        "valkey",
    ]

    [resources.database]
    type = "postgresql"
