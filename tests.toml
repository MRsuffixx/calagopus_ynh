test_format = 1.0

[default]
    # Install on the domain root (Calagopus is typically hosted at /)
    args.domain = "domain.tld"
    args.path = "/"
    args.init_main_permission = "visitors"

    # Upgrade test — references the initial release commit/version
    # Update this SHA when a new upstream version is packaged
    # test_upgrade_from.<commit>.name = "1.0~ynh1"
    # test_upgrade_from.<commit>.args.domain = "domain.tld"
    # test_upgrade_from.<commit>.args.path = "/"

[subdir_test]
    only = ["install.subdir", "backup_restore"]
    args.path = "/calagopus"
